<!doctype html>
<html lang="en">
  <head>
    <!-- LO BÁSICO -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sr. Rinkue - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="assets/Favicon.png?v=2" />
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <!-- BARRA DE NAVEGACIÓN "TOPNAV" -->
    <header id="topbar">
      <div class="logo-area">
        <div class="logo-box">
          <img src="assets/Logo.png">
        </div>
      </div>

      <div class="topbar-spacer"></div>

      <nav id="nav-links">
        <a href="index.htm" class="active" data-i18n="nav_home">HOME</a>
        <a href="about.htm" data-i18n="nav_about">ABOUT</a>
        <div class="lang-wrap">
          <button id="lang-btn" aria-expanded="false" aria-haspopup="true">
            LANGUAGE: EN<span class="lang-arrow">▾</span>
          </button>
          <div id="lang-dropdown" role="menu">
            <div class="lang-dropdown-header" data-i18n="lang_dropdown_label">
              LANGUAGE
            </div>
            <div class="lang-option" data-lang="es" role="menuitem">
              <span data-i18n="lang_es">Español castellano</span>
              <span class="lang-code">ES</span>
            </div>
            <div class="lang-option" data-lang="en" role="menuitem">
              <span data-i18n="lang_en">English</span>
              <span class="lang-code">EN</span>
            </div>
          </div>
        </div>
      </nav>

      <button id="hamburger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div id="mobile-menu" role="navigation">
      <a href="index.htm" class="active" data-i18n="nav_home">HOME</a>
      <a href="about.htm" data-i18n="nav_about">ABOUT</a>
      <div class="mobile-lang-header" data-i18n="lang_dropdown_label">
        LANGUAGE
      </div>
      <div class="mobile-lang-option" data-lang="es">
        <span data-i18n="lang_es">Español castellano</span>
        <span class="lang-code">ES</span>
      </div>
      <div class="mobile-lang-option" data-lang="en">
        <span data-i18n="lang_en">English</span>
        <span class="lang-code">EN</span>
      </div>
    </div>

    <main>
      <div class="section-card">
        <div class="card-header" data-i18n="index_games_title">Games</div>
        <div class="card-body">
          <div class="games-grid">
            <!-- LUPUS -->
            <div class="game-entry">
              <div class="game-cover">
                <img src="assets/LUPUS_Portada_Itch.png">
              </div>
              <div class="game-title">THE TOWN</div>
              <a href="the-town.htm" class="btn" data-i18n="game_more_info"
                >More info</a
              >
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer>
      <span data-i18n="footer">© 2026 Sr. Rinkue. All Rights Reserved.</span>
    </footer>

    <!-- SCRIPTS -->
    <script src="src/i18n.js"></script>
    <script src="src/script.js"></script>
  </body>
</html>
